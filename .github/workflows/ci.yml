name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  # ---------------------------------------------------------------------------
  # Linux x86_64 — tch-backend (libtorch CPU), FFmpeg built from source
  # ---------------------------------------------------------------------------
  build-linux-x86:
    name: Linux x86_64 (tch-backend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1

      # Build toolchain for ffmpeg-next build feature + codec libraries
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            nasm \
            libclang-dev \
            pkg-config \
            libopus-dev \
            libmp3lame-dev

      # Download libtorch (CPU) for tch crate
      - name: Download libtorch
        run: |
          curl -Lo libtorch.zip "https://download.pytorch.org/libtorch/cpu/libtorch-cxx11-abi-shared-with-deps-2.7.1%2Bcpu.zip"
          unzip -q libtorch.zip

      - name: Set linker rpath-link (Linux only)
        run: echo "RUSTFLAGS=-C link-arg=-Wl,-rpath-link,${{ github.workspace }}/libtorch/lib" >> "$GITHUB_ENV"

      - name: Build voice-actions (tch-backend, build-ffmpeg)
        env:
          LIBTORCH: ${{ github.workspace }}/libtorch
          LIBTORCH_BYPASS_VERSION_CHECK: "1"
        run: cargo build --release --features build-ffmpeg

      - name: Build WASM modules
        env:
          RUSTFLAGS: ""
        run: |
          cargo build --target wasm32-wasip1 --release --manifest-path wasm/echo/Cargo.toml
          cd wasm/llm && RUSTFLAGS="--cfg wasmedge --cfg tokio_unstable" cargo build --target wasm32-wasip1 --release

      - name: Run tests
        env:
          LIBTORCH: ${{ github.workspace }}/libtorch
          LIBTORCH_BYPASS_VERSION_CHECK: "1"
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: cargo test --release --features build-ffmpeg

      # -------------------------------------------------------------------
      # End-to-end test
      # -------------------------------------------------------------------
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install huggingface_hub transformers

      - name: Set library path
        run: echo "LD_LIBRARY_PATH=${{ github.workspace }}/libtorch/lib:$LD_LIBRARY_PATH" >> "$GITHUB_ENV"

      - name: Download models
        run: |
          python3 -c "
          from huggingface_hub import snapshot_download
          snapshot_download('Qwen/Qwen3-ASR-0.6B', local_dir='models/Qwen3-ASR-0.6B')
          snapshot_download('Qwen/Qwen3-TTS-12Hz-0.6B-CustomVoice', local_dir='models/Qwen3-TTS-12Hz-0.6B-CustomVoice')
          "

      - name: Generate tokenizer.json
        run: |
          python3 -c "
          from transformers import AutoTokenizer
          for model in ['Qwen3-ASR-0.6B', 'Qwen3-TTS-12Hz-0.6B-CustomVoice']:
              path = f'models/{model}'
              tok = AutoTokenizer.from_pretrained(path, trust_remote_code=True)
              tok.backend_tokenizer.save(f'{path}/tokenizer.json')
          "

      - name: Run end-to-end test
        run: |
          # Find WasmEdge shared library in build output
          WASMEDGE_LIB=$(find target/release/build -name "libwasmedge.so*" -type f 2>/dev/null | head -1)
          if [ -n "$WASMEDGE_LIB" ]; then
            WASMEDGE_DIR=$(dirname "$WASMEDGE_LIB")
            echo "Found WasmEdge at: $WASMEDGE_DIR"
            export LD_LIBRARY_PATH="${WASMEDGE_DIR}:${LD_LIBRARY_PATH}"
          fi

          ./target/release/voice-actions \
            --input audio/sample.wav \
            --output output.wav \
            --asr-model ./models/Qwen3-ASR-0.6B \
            --tts-model ./models/Qwen3-TTS-12Hz-0.6B-CustomVoice \
            --wasm wasm/echo/target/wasm32-wasip1/release/echo.wasm

          # Verify output exists and is non-empty
          test -s output.wav && echo "E2E test passed: output.wav created ($(stat -c%s output.wav) bytes)"

      - name: Run end-to-end test (LLM WASM)
        if: env.OPENAI_API_KEY != ''
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          WASMEDGE_LIB=$(find target/release/build -name "libwasmedge.so*" -type f 2>/dev/null | head -1)
          if [ -n "$WASMEDGE_LIB" ]; then
            WASMEDGE_DIR=$(dirname "$WASMEDGE_LIB")
            export LD_LIBRARY_PATH="${WASMEDGE_DIR}:${LD_LIBRARY_PATH}"
          fi

          ./target/release/voice-actions \
            --input audio/sample.wav \
            --output output_llm.wav \
            --asr-model ./models/Qwen3-ASR-0.6B \
            --tts-model ./models/Qwen3-TTS-12Hz-0.6B-CustomVoice \
            --wasm wasm/echo/target/wasm32-wasip1/release/echo.wasm \
            --wasm wasm/llm/target/wasm32-wasip1/release/llm.wasm

          test -s output_llm.wav && echo "E2E LLM test passed: output_llm.wav created ($(stat -c%s output_llm.wav) bytes)"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: e2e-linux-x86_64
          path: |
            audio/sample.wav
            output.wav
            target/release/voice-actions
            wasm/echo/target/wasm32-wasip1/release/echo.wasm

  # ---------------------------------------------------------------------------
  # Linux ARM64 — tch-backend (libtorch CPU), FFmpeg built from source
  # ---------------------------------------------------------------------------
  build-linux-arm:
    name: Linux ARM64 (tch-backend)
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            nasm \
            libclang-dev \
            pkg-config \
            libopus-dev \
            libmp3lame-dev

      - name: Download libtorch
        run: |
          curl -Lo libtorch.tar.gz "https://github.com/second-state/libtorch-releases/releases/download/v2.7.1/libtorch-cxx11-abi-aarch64-2.7.1.tar.gz"
          tar xzf libtorch.tar.gz

      - name: Set linker rpath-link (Linux only)
        run: echo "RUSTFLAGS=-C link-arg=-Wl,-rpath-link,${{ github.workspace }}/libtorch/lib" >> "$GITHUB_ENV"

      - name: Build voice-actions (tch-backend, build-ffmpeg)
        env:
          LIBTORCH: ${{ github.workspace }}/libtorch
          LIBTORCH_BYPASS_VERSION_CHECK: "1"
        run: cargo build --release --features build-ffmpeg

      - name: Build WASM modules
        env:
          RUSTFLAGS: ""
        run: |
          cargo build --target wasm32-wasip1 --release --manifest-path wasm/echo/Cargo.toml
          cd wasm/llm && RUSTFLAGS="--cfg wasmedge --cfg tokio_unstable" cargo build --target wasm32-wasip1 --release

      - name: Run tests
        env:
          LIBTORCH: ${{ github.workspace }}/libtorch
          LIBTORCH_BYPASS_VERSION_CHECK: "1"
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: cargo test --release --features build-ffmpeg

      # -------------------------------------------------------------------
      # End-to-end test
      # -------------------------------------------------------------------
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install huggingface_hub transformers

      - name: Set library path
        run: echo "LD_LIBRARY_PATH=${{ github.workspace }}/libtorch/lib:$LD_LIBRARY_PATH" >> "$GITHUB_ENV"

      - name: Download models
        run: |
          python3 -c "
          from huggingface_hub import snapshot_download
          snapshot_download('Qwen/Qwen3-ASR-0.6B', local_dir='models/Qwen3-ASR-0.6B')
          snapshot_download('Qwen/Qwen3-TTS-12Hz-0.6B-CustomVoice', local_dir='models/Qwen3-TTS-12Hz-0.6B-CustomVoice')
          "

      - name: Generate tokenizer.json
        run: |
          python3 -c "
          from transformers import AutoTokenizer
          for model in ['Qwen3-ASR-0.6B', 'Qwen3-TTS-12Hz-0.6B-CustomVoice']:
              path = f'models/{model}'
              tok = AutoTokenizer.from_pretrained(path, trust_remote_code=True)
              tok.backend_tokenizer.save(f'{path}/tokenizer.json')
          "

      - name: Run end-to-end test
        run: |
          WASMEDGE_LIB=$(find target/release/build -name "libwasmedge.so*" -type f 2>/dev/null | head -1)
          if [ -n "$WASMEDGE_LIB" ]; then
            WASMEDGE_DIR=$(dirname "$WASMEDGE_LIB")
            echo "Found WasmEdge at: $WASMEDGE_DIR"
            export LD_LIBRARY_PATH="${WASMEDGE_DIR}:${LD_LIBRARY_PATH}"
          fi

          ./target/release/voice-actions \
            --input audio/sample.wav \
            --output output.wav \
            --asr-model ./models/Qwen3-ASR-0.6B \
            --tts-model ./models/Qwen3-TTS-12Hz-0.6B-CustomVoice \
            --wasm wasm/echo/target/wasm32-wasip1/release/echo.wasm

          test -s output.wav && echo "E2E test passed: output.wav created ($(stat -c%s output.wav) bytes)"

      - name: Run end-to-end test (LLM WASM)
        if: env.OPENAI_API_KEY != ''
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          WASMEDGE_LIB=$(find target/release/build -name "libwasmedge.so*" -type f 2>/dev/null | head -1)
          if [ -n "$WASMEDGE_LIB" ]; then
            WASMEDGE_DIR=$(dirname "$WASMEDGE_LIB")
            export LD_LIBRARY_PATH="${WASMEDGE_DIR}:${LD_LIBRARY_PATH}"
          fi

          ./target/release/voice-actions \
            --input audio/sample.wav \
            --output output_llm.wav \
            --asr-model ./models/Qwen3-ASR-0.6B \
            --tts-model ./models/Qwen3-TTS-12Hz-0.6B-CustomVoice \
            --wasm wasm/echo/target/wasm32-wasip1/release/echo.wasm \
            --wasm wasm/llm/target/wasm32-wasip1/release/llm.wasm

          test -s output_llm.wav && echo "E2E LLM test passed: output_llm.wav created ($(stat -c%s output_llm.wav) bytes)"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: e2e-linux-aarch64
          path: |
            audio/sample.wav
            output.wav
            target/release/voice-actions
            wasm/echo/target/wasm32-wasip1/release/echo.wasm

  # ---------------------------------------------------------------------------
  # macOS ARM64 — mlx backend (Apple Silicon Metal GPU), FFmpeg built from source
  # ---------------------------------------------------------------------------
  build-macos:
    name: macOS ARM64 (mlx)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1

      # cmake needed for mlx backend build; nasm for ffmpeg build; opus/lame for codecs
      - name: Install build dependencies
        run: |
          brew install cmake nasm pkg-config opus lame

      # wasi-sdk provides clang + sysroot for cross-compiling C code to wasm32-wasip1
      # (needed by ring/rustls in the LLM WASM module)
      - name: Install wasi-sdk
        run: |
          curl -Lo wasi-sdk.tar.gz "https://github.com/WebAssembly/wasi-sdk/releases/download/wasi-sdk-25/wasi-sdk-25.0-arm64-macos.tar.gz"
          mkdir -p wasi-sdk
          tar xzf wasi-sdk.tar.gz -C wasi-sdk --strip-components=1
          echo "WASI_SDK_PATH=${{ github.workspace }}/wasi-sdk" >> "$GITHUB_ENV"
          echo "CC_wasm32_wasip1=${{ github.workspace }}/wasi-sdk/bin/clang" >> "$GITHUB_ENV"

      - name: Build voice-actions (mlx, build-ffmpeg)
        env:
          CFLAGS: "-I/opt/homebrew/include"
          LDFLAGS: "-L/opt/homebrew/lib"
          LIBRARY_PATH: "/opt/homebrew/lib"
        run: |
          cargo clean
          cargo build --release --no-default-features --features mlx,build-ffmpeg

      - name: Build WASM modules
        env:
          RUSTFLAGS: ""
        run: |
          cargo build --target wasm32-wasip1 --release --manifest-path wasm/echo/Cargo.toml
          cd wasm/llm && RUSTFLAGS="--cfg wasmedge --cfg tokio_unstable" cargo build --target wasm32-wasip1 --release

      - name: Run tests
        env:
          CFLAGS: "-I/opt/homebrew/include"
          LDFLAGS: "-L/opt/homebrew/lib"
          LIBRARY_PATH: "/opt/homebrew/lib"
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: cargo test --release --no-default-features --features mlx,build-ffmpeg

      # -------------------------------------------------------------------
      # End-to-end test
      # -------------------------------------------------------------------
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install huggingface_hub transformers

      - name: Download models
        run: |
          python3 -c "
          from huggingface_hub import snapshot_download
          snapshot_download('Qwen/Qwen3-ASR-0.6B', local_dir='models/Qwen3-ASR-0.6B')
          snapshot_download('Qwen/Qwen3-TTS-12Hz-0.6B-CustomVoice', local_dir='models/Qwen3-TTS-12Hz-0.6B-CustomVoice')
          "

      - name: Generate tokenizer.json
        run: |
          python3 -c "
          from transformers import AutoTokenizer
          for model in ['Qwen3-ASR-0.6B', 'Qwen3-TTS-12Hz-0.6B-CustomVoice']:
              path = f'models/{model}'
              tok = AutoTokenizer.from_pretrained(path, trust_remote_code=True)
              tok.backend_tokenizer.save(f'{path}/tokenizer.json')
          "

      # Copy WasmEdge dylib next to binary — build.rs sets @executable_path rpath
      # so no DYLD_LIBRARY_PATH is needed at runtime
      - name: Copy WasmEdge dylib
        run: |
          WASMEDGE_LIB=$(find target/release/build -name "libwasmedge*.dylib" -type f 2>/dev/null | head -1)
          if [ -n "$WASMEDGE_LIB" ]; then
            cp "$WASMEDGE_LIB" target/release/
            cd target/release && ln -sf "$(basename "$WASMEDGE_LIB")" libwasmedge.0.dylib
            echo "Copied WasmEdge dylib to target/release/"
          fi

      - name: Run end-to-end test
        run: |
          ./target/release/voice-actions \
            --input audio/sample.wav \
            --output output.wav \
            --asr-model ./models/Qwen3-ASR-0.6B \
            --tts-model ./models/Qwen3-TTS-12Hz-0.6B-CustomVoice \
            --wasm wasm/echo/target/wasm32-wasip1/release/echo.wasm

          test -s output.wav && echo "E2E test passed: output.wav created ($(stat -f%z output.wav) bytes)"

      - name: Run end-to-end test (LLM WASM)
        if: env.OPENAI_API_KEY != ''
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          ./target/release/voice-actions \
            --input audio/sample.wav \
            --output output_llm.wav \
            --asr-model ./models/Qwen3-ASR-0.6B \
            --tts-model ./models/Qwen3-TTS-12Hz-0.6B-CustomVoice \
            --wasm wasm/echo/target/wasm32-wasip1/release/echo.wasm \
            --wasm wasm/llm/target/wasm32-wasip1/release/llm.wasm

          test -s output_llm.wav && echo "E2E LLM test passed: output_llm.wav created ($(stat -f%z output_llm.wav) bytes)"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: e2e-macos-arm64
          path: |
            audio/sample.wav
            output.wav
            target/release/voice-actions
            wasm/echo/target/wasm32-wasip1/release/echo.wasm

  # ---------------------------------------------------------------------------
  # Lint & format (fast, no heavy deps needed — check only)
  # ---------------------------------------------------------------------------
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: wasm32-wasip1

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Check WASM modules formatting
        run: |
          cargo fmt --manifest-path wasm/echo/Cargo.toml -- --check
          cargo fmt --manifest-path wasm/llm/Cargo.toml -- --check
