name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  # ---------------------------------------------------------------------------
  # Linux x86_64 — tch-backend (libtorch CPU), FFmpeg built from source
  # ---------------------------------------------------------------------------
  build-linux-x86:
    name: Linux x86_64 (tch-backend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1

      - uses: Swatinem/rust-cache@v2
        with:
          key: linux-x86-tch

      # Build toolchain for ffmpeg-next build feature + codec libraries
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            nasm \
            libclang-dev \
            pkg-config \
            libopus-dev \
            libmp3lame-dev

      # Download libtorch (CPU) for tch crate
      - name: Download libtorch
        run: |
          curl -Lo libtorch.zip "https://download.pytorch.org/libtorch/cpu/libtorch-cxx11-abi-shared-with-deps-2.7.1%2Bcpu.zip"
          unzip -q libtorch.zip
          echo "LIBTORCH=$PWD/libtorch" >> "$GITHUB_ENV"
          echo "LIBTORCH_CXX11_ABI=1" >> "$GITHUB_ENV"
          echo "LIBTORCH_BYPASS_VERSION_CHECK=1" >> "$GITHUB_ENV"
          echo "LD_LIBRARY_PATH=$PWD/libtorch/lib:$LD_LIBRARY_PATH" >> "$GITHUB_ENV"

      - name: Build voice-actions (tch-backend, build-ffmpeg)
        env:
          RUSTFLAGS: "-C link-arg=-Wl,-rpath-link,${{ github.workspace }}/libtorch/lib"
        run: cargo build --release --features build-ffmpeg

      - name: Build example WASM module
        run: cargo build --target wasm32-wasip1 --release --manifest-path example_wasm/Cargo.toml

      - name: Run tests
        env:
          RUSTFLAGS: "-C link-arg=-Wl,-rpath-link,${{ github.workspace }}/libtorch/lib"
        run: cargo test --release --features build-ffmpeg

      # -------------------------------------------------------------------
      # End-to-end test
      # -------------------------------------------------------------------
      - name: Install Python dependencies
        run: pip install huggingface_hub transformers

      - name: Download models
        run: |
          huggingface-cli download Qwen/Qwen3-ASR-0.6B --local-dir models/Qwen3-ASR-0.6B
          huggingface-cli download Qwen/Qwen3-TTS-12Hz-0.6B-CustomVoice --local-dir models/Qwen3-TTS-12Hz-0.6B-CustomVoice

      - name: Generate tokenizer.json
        run: |
          python3 -c "
          from transformers import AutoTokenizer
          for model in ['Qwen3-ASR-0.6B', 'Qwen3-TTS-12Hz-0.6B-CustomVoice']:
              path = f'models/{model}'
              tok = AutoTokenizer.from_pretrained(path, trust_remote_code=True)
              tok.backend_tokenizer.save(f'{path}/tokenizer.json')
          "

      - name: Run end-to-end test
        run: |
          # Find WasmEdge library in build output
          WASMEDGE_DIR=$(find target/release/build -path "*/wasmedge-sys-*/out/standalone/*/lib" -type d | head -1)
          export LD_LIBRARY_PATH="${WASMEDGE_DIR}:${LD_LIBRARY_PATH}"

          ./target/release/voice-actions \
            --input audio/sample.wav \
            --output output.mp3 \
            --asr-model ./models/Qwen3-ASR-0.6B \
            --tts-model ./models/Qwen3-TTS-12Hz-0.6B-CustomVoice \
            --wasm example_wasm/target/wasm32-wasip1/release/example_wasm.wasm

          # Verify output exists and is non-empty
          test -s output.mp3 && echo "E2E test passed: output.mp3 created ($(stat -c%s output.mp3) bytes)"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: e2e-linux-x86_64
          path: |
            audio/sample.wav
            output.mp3
            target/release/voice-actions
            example_wasm/target/wasm32-wasip1/release/example_wasm.wasm

  # ---------------------------------------------------------------------------
  # Linux ARM64 — tch-backend (libtorch CPU), FFmpeg built from source
  # ---------------------------------------------------------------------------
  build-linux-arm:
    name: Linux ARM64 (tch-backend)
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1

      - uses: Swatinem/rust-cache@v2
        with:
          key: linux-arm-tch

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            nasm \
            libclang-dev \
            pkg-config \
            libopus-dev \
            libmp3lame-dev

      - name: Download libtorch
        run: |
          curl -Lo libtorch.tar.gz "https://github.com/second-state/libtorch-releases/releases/download/v2.7.1/libtorch-cxx11-abi-aarch64-2.7.1.tar.gz"
          tar xzf libtorch.tar.gz
          echo "LIBTORCH=$PWD/libtorch" >> "$GITHUB_ENV"
          echo "LIBTORCH_CXX11_ABI=1" >> "$GITHUB_ENV"
          echo "LIBTORCH_BYPASS_VERSION_CHECK=1" >> "$GITHUB_ENV"
          echo "LD_LIBRARY_PATH=$PWD/libtorch/lib:$LD_LIBRARY_PATH" >> "$GITHUB_ENV"

      - name: Build voice-actions (tch-backend, build-ffmpeg)
        env:
          RUSTFLAGS: "-C link-arg=-Wl,-rpath-link,${{ github.workspace }}/libtorch/lib"
        run: cargo build --release --features build-ffmpeg

      - name: Build example WASM module
        run: cargo build --target wasm32-wasip1 --release --manifest-path example_wasm/Cargo.toml

      - name: Run tests
        env:
          RUSTFLAGS: "-C link-arg=-Wl,-rpath-link,${{ github.workspace }}/libtorch/lib"
        run: cargo test --release --features build-ffmpeg

      # -------------------------------------------------------------------
      # End-to-end test
      # -------------------------------------------------------------------
      - name: Install Python dependencies
        run: pip install huggingface_hub transformers

      - name: Download models
        run: |
          huggingface-cli download Qwen/Qwen3-ASR-0.6B --local-dir models/Qwen3-ASR-0.6B
          huggingface-cli download Qwen/Qwen3-TTS-12Hz-0.6B-CustomVoice --local-dir models/Qwen3-TTS-12Hz-0.6B-CustomVoice

      - name: Generate tokenizer.json
        run: |
          python3 -c "
          from transformers import AutoTokenizer
          for model in ['Qwen3-ASR-0.6B', 'Qwen3-TTS-12Hz-0.6B-CustomVoice']:
              path = f'models/{model}'
              tok = AutoTokenizer.from_pretrained(path, trust_remote_code=True)
              tok.backend_tokenizer.save(f'{path}/tokenizer.json')
          "

      - name: Run end-to-end test
        run: |
          WASMEDGE_DIR=$(find target/release/build -path "*/wasmedge-sys-*/out/standalone/*/lib" -type d | head -1)
          export LD_LIBRARY_PATH="${WASMEDGE_DIR}:${LD_LIBRARY_PATH}"

          ./target/release/voice-actions \
            --input audio/sample.wav \
            --output output.mp3 \
            --asr-model ./models/Qwen3-ASR-0.6B \
            --tts-model ./models/Qwen3-TTS-12Hz-0.6B-CustomVoice \
            --wasm example_wasm/target/wasm32-wasip1/release/example_wasm.wasm

          test -s output.mp3 && echo "E2E test passed: output.mp3 created ($(stat -c%s output.mp3) bytes)"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: e2e-linux-aarch64
          path: |
            audio/sample.wav
            output.mp3
            target/release/voice-actions
            example_wasm/target/wasm32-wasip1/release/example_wasm.wasm

  # ---------------------------------------------------------------------------
  # macOS ARM64 — mlx backend (Apple Silicon Metal GPU), FFmpeg built from source
  # ---------------------------------------------------------------------------
  build-macos:
    name: macOS ARM64 (mlx)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1

      - uses: Swatinem/rust-cache@v2
        with:
          key: macos-mlx

      # cmake needed for mlx backend build; nasm for ffmpeg build; opus/lame for codecs
      - name: Install build dependencies
        run: |
          brew install cmake nasm pkg-config opus lame

      - name: Build voice-actions (mlx, build-ffmpeg)
        env:
          CFLAGS: "-I/opt/homebrew/include"
          LDFLAGS: "-L/opt/homebrew/lib"
          LIBRARY_PATH: "/opt/homebrew/lib"
        run: cargo build --release --no-default-features --features mlx,build-ffmpeg

      - name: Build example WASM module
        run: cargo build --target wasm32-wasip1 --release --manifest-path example_wasm/Cargo.toml

      - name: Run tests
        env:
          CFLAGS: "-I/opt/homebrew/include"
          LDFLAGS: "-L/opt/homebrew/lib"
          LIBRARY_PATH: "/opt/homebrew/lib"
        run: cargo test --release --no-default-features --features mlx,build-ffmpeg

      # -------------------------------------------------------------------
      # End-to-end test
      # -------------------------------------------------------------------
      - name: Install Python dependencies
        run: pip3 install huggingface_hub transformers --break-system-packages

      - name: Download models
        run: |
          huggingface-cli download Qwen/Qwen3-ASR-0.6B --local-dir models/Qwen3-ASR-0.6B
          huggingface-cli download Qwen/Qwen3-TTS-12Hz-0.6B-CustomVoice --local-dir models/Qwen3-TTS-12Hz-0.6B-CustomVoice

      - name: Generate tokenizer.json
        run: |
          python3 -c "
          from transformers import AutoTokenizer
          for model in ['Qwen3-ASR-0.6B', 'Qwen3-TTS-12Hz-0.6B-CustomVoice']:
              path = f'models/{model}'
              tok = AutoTokenizer.from_pretrained(path, trust_remote_code=True)
              tok.backend_tokenizer.save(f'{path}/tokenizer.json')
          "

      - name: Run end-to-end test
        run: |
          WASMEDGE_DIR=$(find target/release/build -path "*/wasmedge-sys-*/out/standalone/*/lib" -type d | head -1)
          export DYLD_LIBRARY_PATH="${WASMEDGE_DIR}:${DYLD_LIBRARY_PATH}"

          ./target/release/voice-actions \
            --input audio/sample.wav \
            --output output.mp3 \
            --asr-model ./models/Qwen3-ASR-0.6B \
            --tts-model ./models/Qwen3-TTS-12Hz-0.6B-CustomVoice \
            --wasm example_wasm/target/wasm32-wasip1/release/example_wasm.wasm

          test -s output.mp3 && echo "E2E test passed: output.mp3 created ($(stat -f%z output.mp3) bytes)"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: e2e-macos-arm64
          path: |
            audio/sample.wav
            output.mp3
            target/release/voice-actions
            example_wasm/target/wasm32-wasip1/release/example_wasm.wasm

  # ---------------------------------------------------------------------------
  # Lint & format (fast, no heavy deps needed — check only)
  # ---------------------------------------------------------------------------
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: wasm32-wasip1

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Check example_wasm formatting
        run: cargo fmt --manifest-path example_wasm/Cargo.toml -- --check
